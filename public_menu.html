<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand: #f59e0b;
            --brand-dark: #d97706;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
            --text: #111827;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --hero-from: #1e293b;
            --hero-to: #0f172a;
            --radius: 16px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ── HERO ── */
        #hero {
            position: relative;
            background: linear-gradient(160deg, var(--hero-from), var(--hero-to));
            min-height: 220px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 24px 60px;
            overflow: hidden;
            text-align: center;
        }
        #hero::before {
            content: '';
            position: absolute; inset: 0;
            background: radial-gradient(circle at 60% 30%, rgba(245,158,11,0.18) 0%, transparent 70%);
            pointer-events: none;
        }
        #hero-banner-img {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0.25;
        }
        .hero-logo {
            position: relative;
            width: 80px; height: 80px;
            border-radius: 50%;
            background: var(--brand);
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; font-weight: 900;
            color: #fff;
            margin-bottom: 14px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3), 0 0 0 4px rgba(255,255,255,0.12);
            overflow: hidden;
        }
        .hero-logo img { width: 100%; height: 100%; object-fit: cover; }
        #hero-name {
            position: relative;
            font-size: 1.75rem; font-weight: 800;
            color: #fff;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 12px rgba(0,0,0,0.4);
        }
        #hero-desc {
            position: relative;
            margin-top: 6px;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.7);
            font-weight: 400;
            max-width: 280px;
        }

        /* ── STICKY BAR ── */
        #sticky-bar {
            position: sticky;
            top: 0; z-index: 100;
            background: rgba(248,249,250,0.92);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 10px 16px 0;
            margin-top: -24px;
            border-radius: 24px 24px 0 0;
        }
        #search-wrap {
            position: relative;
            margin-bottom: 10px;
        }
        #search-icon {
            position: absolute; left: 12px; top: 50%;
            transform: translateY(-50%);
            font-size: 1rem; color: var(--text-muted);
        }
        #menu-search {
            width: 100%;
            padding: 10px 16px 10px 36px;
            border-radius: 50px;
            border: 1.5px solid var(--border);
            background: var(--card-bg);
            font-size: 0.88rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.2s;
            color: var(--text);
        }
        #menu-search:focus { border-color: var(--brand); }

        #cats-strip {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 10px;
            scrollbar-width: none;
        }
        #cats-strip::-webkit-scrollbar { display: none; }
        .cat-pill {
            white-space: nowrap;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            border: 1.5px solid var(--border);
            background: var(--card-bg);
            color: var(--text-muted);
            transition: all 0.18s;
            flex-shrink: 0;
        }
        .cat-pill:hover { border-color: var(--brand); color: var(--brand); }
        .cat-pill.active {
            background: var(--brand);
            border-color: var(--brand);
            color: #fff;
            box-shadow: 0 4px 12px rgba(245,158,11,0.3);
        }

        /* ── MAIN CONTENT ── */
        #main-wrap {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px 16px 100px;
        }

        /* ── CATEGORY SECTION ── */
        .cat-section { margin-bottom: 8px; }
        .cat-header {
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            padding: 20px 0 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .cat-header::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* ── PRODUCT CARD ── */
        .item-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 14px;
            display: flex;
            gap: 14px;
            align-items: flex-start;
            margin-bottom: 10px;
            cursor: default;
            transition: box-shadow 0.2s, transform 0.15s;
        }
        .item-card:hover {
            box-shadow: 0 6px 24px rgba(0,0,0,0.08);
            transform: translateY(-1px);
        }
        .item-card.agotado { opacity: 0.55; }

        .item-icon {
            width: 56px; height: 56px;
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.6rem;
            flex-shrink: 0;
        }
        .item-body { flex: 1; min-width: 0; }
        .item-name {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .item-desc {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 3px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .item-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 8px;
        }
        .item-price {
            font-size: 1rem;
            font-weight: 800;
            color: var(--brand-dark);
        }
        .item-badge {
            font-size: 0.7rem;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 50px;
        }
        .badge-ok { background: #dcfce7; color: #166534; }
        .badge-out { background: #fee2e2; color: #991b1b; }
        .badge-low { background: #fef3c7; color: #92400e; }

        /* ── EMPTY / LOADING ── */
        #empty-msg {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        #empty-msg .big { font-size: 3rem; margin-bottom: 12px; }
        #empty-msg p { font-size: 0.95rem; }

        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
            border-radius: 10px;
        }
        @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

        /* ── NEQUI CARD ── */
        #nequi-wrap {
            max-width: 600px;
            margin: 0 auto;
            padding: 0 16px 40px;
        }
        #nequi-card {
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            border-radius: var(--radius);
            padding: 22px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 18px;
            box-shadow: 0 8px 32px rgba(79,70,229,0.3);
        }
        #nequi-card .nequi-icon {
            width: 56px; height: 56px;
            background: rgba(255,255,255,0.15);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem;
            flex-shrink: 0;
        }
        #nequi-card h3 { font-size: 1rem; font-weight: 700; margin-bottom: 4px; }
        #nequi-card p { font-size: 0.82rem; opacity: 0.85; margin-bottom: 10px; }
        #nequi-number-display {
            font-size: 1.3rem;
            font-weight: 800;
            letter-spacing: 1px;
        }
        #nequi-qr-img {
            width: 72px; height: 72px;
            border-radius: 10px;
            border: 3px solid rgba(255,255,255,0.3);
            object-fit: contain;
            background: white;
            flex-shrink: 0;
        }

        /* ── FOOTER ── */
        footer {
            text-align: center;
            padding: 16px;
            color: var(--text-muted);
            font-size: 0.78rem;
            border-top: 1px solid var(--border);
        }

        /* ── DARK MODE ── */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f172a;
                --card-bg: #1e293b;
                --text: #f1f5f9;
                --text-muted: #94a3b8;
                --border: #334155;
            }
            #sticky-bar { background: rgba(15,23,42,0.92); }
            #menu-search { background: #1e293b; color: #f1f5f9; }
            .skeleton { background: linear-gradient(90deg, #1e293b 25%, #263348 50%, #1e293b 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; }
        }

        /* ── ANIMATIONS ── */
        .item-card { animation: fadeUp 0.3s ease both; }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<!-- HERO -->
<header id="hero">
    <img id="hero-banner-img" src="" alt="" style="display:none">
    <div class="hero-logo" id="hero-logo">
        <span id="hero-initial">🍽️</span>
    </div>
    <h1 id="hero-name">Cargando...</h1>
    <p id="hero-desc"></p>
</header>

<!-- STICKY BAR -->
<div id="sticky-bar">
    <div id="search-wrap">
        <span id="search-icon">🔍</span>
        <input type="search" id="menu-search" placeholder="Buscar platillo..." oninput="filterMenu()">
    </div>
    <div id="cats-strip"></div>
</div>

<!-- MENU -->
<main id="main-wrap">
    <div id="menu-list"></div>
</main>

<!-- NEQUI -->
<div id="nequi-wrap"></div>

<footer><p>🍽️ Menú Digital · Precios en COP</p></footer>

<script>
// ── CONFIG ──
var API_BASE = "https://beta-restaurante.onrender.com/api";

var urlParams = new URLSearchParams(window.location.search);
var restId = urlParams.get('rest');

var fullMenu = [];
var cats = new Set();
var activeCat = 'Todos';

function cop(n) {
    return new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', minimumFractionDigits: 0 }).format(n);
}

// Category icons and colors
var CAT_META = {
    'comida':      { icon: '🍽️', bg: '#fff7ed', dark: '#fed7aa' },
    'bebida':      { icon: '🥤', bg: '#eff6ff', dark: '#bfdbfe' },
    'postre':      { icon: '🍰', bg: '#fdf2f8', dark: '#f9a8d4' },
    'hamburguesa': { icon: '🍔', bg: '#fefce8', dark: '#fde68a' },
    'pizza':       { icon: '🍕', bg: '#fff1f2', dark: '#fecdd3' },
    'ensalada':    { icon: '🥗', bg: '#f0fdf4', dark: '#bbf7d0' },
    'pollo':       { icon: '🍗', bg: '#fff7ed', dark: '#fed7aa' },
    'pescado':     { icon: '🐟', bg: '#f0f9ff', dark: '#bae6fd' },
    'sopa':        { icon: '🥣', bg: '#fefce8', dark: '#fde68a' },
    'desayuno':    { icon: '🍳', bg: '#fffbeb', dark: '#fde68a' },
    'arroz':       { icon: '🍚', bg: '#f8fafc', dark: '#e2e8f0' },
    'pasta':       { icon: '🍝', bg: '#fff7ed', dark: '#fed7aa' },
    'tacos':       { icon: '🌮', bg: '#fefce8', dark: '#fde68a' },
    'helado':      { icon: '🍦', bg: '#fdf2f8', dark: '#f9a8d4' },
    'cafe':        { icon: '☕', bg: '#fdf6ec', dark: '#f6d860' },
};

function getCatMeta(cat) {
    var key = (cat || '').toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, '');
    for (var k in CAT_META) {
        if (key.includes(k)) return CAT_META[k];
    }
    return { icon: '🍴', bg: '#f8fafc', dark: '#e2e8f0' };
}

function getStockBadge(stock) {
    if (stock === null || stock === undefined || stock > 10) return '<span class="item-badge badge-ok">Disponible</span>';
    if (stock <= 0) return '<span class="item-badge badge-out">Agotado</span>';
    return '<span class="item-badge badge-low">Últimas ' + stock + '</span>';
}

function renderMenu(items) {
    var list = document.getElementById('menu-list');
    if (!items || items.length === 0) {
        list.innerHTML = '<div id="empty-msg"><div class="big">🍽️</div><p>No hay platillos en esta categoría</p></div>';
        return;
    }

    // Group by category
    var grouped = {};
    items.forEach(function(it) {
        var c = it.category || 'General';
        if (!grouped[c]) grouped[c] = [];
        grouped[c].push(it);
    });

    var html = '';
    var delay = 0;
    Object.keys(grouped).forEach(function(cat) {
        html += '<div class="cat-section">';
        var meta = getCatMeta(cat);
        html += '<div class="cat-header">' + meta.icon + ' ' + cat + '</div>';
        grouped[cat].forEach(function(it) {
            var isOut = it.stock !== null && it.stock !== undefined && it.stock <= 0;
            var m = getCatMeta(it.category);
            html += '<div class="item-card' + (isOut ? ' agotado' : '') + '" style="animation-delay:' + (delay * 60) + 'ms">';
            html += '<div class="item-icon" style="background:' + m.bg + '">' + m.icon + '</div>';
            html += '<div class="item-body">';
            html += '<div class="item-name">' + it.name + '</div>';
            if (it.description) html += '<div class="item-desc">' + it.description + '</div>';
            html += '<div class="item-footer">';
            html += '<div class="item-price">' + cop(it.price) + '</div>';
            html += getStockBadge(it.stock);
            html += '</div></div></div>';
            delay++;
        });
        html += '</div>';
    });
    list.innerHTML = html;
}

function buildCatStrip() {
    var strip = document.getElementById('cats-strip');
    var allCats = ['Todos'];
    cats.forEach(function(c) { allCats.push(c); });
    strip.innerHTML = allCats.map(function(c) {
        var meta = getCatMeta(c);
        var icon = c === 'Todos' ? '🍴' : meta.icon;
        return '<button class="cat-pill' + (c === activeCat ? ' active' : '') + '" onclick="setCat(\'' + c.replace(/'/g, "\\'") + '\')">' + icon + ' ' + c + '</button>';
    }).join('');
}

function setCat(cat) {
    activeCat = cat;
    buildCatStrip();
    var filtered = cat === 'Todos' ? fullMenu : fullMenu.filter(function(i) { return i.category === cat; });
    var search = document.getElementById('menu-search').value.toLowerCase();
    if (search) filtered = filtered.filter(function(i) { return i.name.toLowerCase().includes(search) || (i.description || '').toLowerCase().includes(search); });
    renderMenu(filtered);
}

function filterMenu() {
    var term = document.getElementById('menu-search').value.toLowerCase();
    var filtered = activeCat === 'Todos' ? fullMenu : fullMenu.filter(function(i) { return i.category === activeCat; });
    if (term) filtered = filtered.filter(function(i) { return i.name.toLowerCase().includes(term) || (i.description || '').toLowerCase().includes(term); });
    renderMenu(filtered);
}

// ── LOAD CONFIG ──
async function loadConfig() {
    try {
        var r = await fetch(API_BASE + '/restaurants/' + restId + '/config');
        var cfg = await r.json();

        // Hero color
        if (cfg.menu_bg_color) {
            document.getElementById('hero').style.background = 'linear-gradient(160deg, ' + cfg.menu_bg_color + 'cc, ' + cfg.menu_bg_color + ')';
        }
        // Banner image
        if (cfg.menu_bg_image) {
            var img = document.getElementById('hero-banner-img');
            img.src = cfg.menu_bg_image;
            img.style.display = 'block';
        }
        // Logo
        var logoEl = document.getElementById('hero-logo');
        if (cfg.menu_logo_url) {
            logoEl.innerHTML = '<img src="' + cfg.menu_logo_url + '" alt="Logo">';
            document.getElementById('hero-initial').style.display = 'none';
        }
        // Description
        if (cfg.menu_description) {
            document.getElementById('hero-desc').textContent = cfg.menu_description;
        }
        // Banner title (used as page title)
        if (cfg.menu_banner_title) {
            document.getElementById('hero-name').textContent = cfg.menu_banner_title;
            document.title = cfg.menu_banner_title + ' · Menú Digital';
        }
        // Nequi
        if (cfg.nequi_number || cfg.nequi_qr) {
            var nw = document.getElementById('nequi-wrap');
            nw.innerHTML = '<div id="nequi-card">' +
                '<div class="nequi-icon">📲</div>' +
                '<div style="flex:1">' +
                '<h3>Paga con Nequi</h3>' +
                '<p>Escanea el QR o transfiere al número</p>' +
                '<div id="nequi-number-display">' + (cfg.nequi_number || '') + '</div>' +
                '</div>' +
                (cfg.nequi_qr ? '<img id="nequi-qr-img" src="' + cfg.nequi_qr + '" alt="QR Nequi">' : '') +
                '</div>';
        }
    } catch(e) {}
}

// ── LOAD MENU ──
async function loadMenu() {
    if (!restId) {
        document.getElementById('hero-name').textContent = 'QR Inválido';
        document.getElementById('menu-list').innerHTML = '<div id="empty-msg"><div class="big">😕</div><p>Escanea un QR válido para ver el menú</p></div>';
        return;
    }

    // Skeleton
    document.getElementById('menu-list').innerHTML = [1,2,3].map(function() {
        return '<div class="item-card"><div class="item-icon skeleton" style="background:#f0f0f0"></div><div class="item-body"><div class="skeleton" style="height:16px;width:60%;margin-bottom:8px"></div><div class="skeleton" style="height:12px;width:90%"></div></div></div>';
    }).join('');

    try {
        var r = await fetch(API_BASE + '/menu/' + restId);
        if (!r.ok) throw new Error('No menu');
        fullMenu = await r.json();
        fullMenu.forEach(function(i) { if (i.category) cats.add(i.category); });
        buildCatStrip();
        renderMenu(fullMenu);

        // Load restaurant name
        try {
            var rr = await fetch(API_BASE + '/restaurants/' + restId + '/name');
            if (rr.ok) {
                var nd = await rr.json();
                if (!document.getElementById('hero-name').textContent || document.getElementById('hero-name').textContent === 'Cargando...') {
                    document.getElementById('hero-name').textContent = nd.name || '';
                }
                document.title = (nd.name || 'Menú') + ' · Menú Digital';
            }
        } catch(e) {}
    } catch(e) {
        document.getElementById('menu-list').innerHTML = '<div id="empty-msg"><div class="big">😕</div><p>No se pudo cargar el menú</p></div>';
    }
}

loadConfig();
loadMenu();
</script>
</body>
</html>
